<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Rápido</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 15px; font-size: 18px; border: 2px solid #ccc; border-radius: 5px; }
        .search-box input:focus { border-color: #007bff; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .total-box { text-align: right; font-size: 24px; font-weight: bold; color: #28a745; margin-bottom: 20px; }
        .btn-finalizar { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-finalizar:hover { background-color: #0056b3; }
        #status { text-align: center; color: #666; font-style: italic; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>PDV Rápido</h1>
    
    <div id="status">Carregando produtos do banco de dados...</div>

    <div class="search-box">
        <input type="text" id="codigoInput" placeholder="Bipe o código de barras ou digite o ID e aperte Enter..." disabled autofocus>
    </div>

    <table id="tabelaCarrinho">
        <thead>
            <tr>
                <th>Código</th>
                <th>Produto</th>
                <th>Qtd</th>
                <th>Preço Un.</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody id="listaCarrinho">
            </tbody>
    </table>

    <div class="total-box">
        Total: R$ <span id="valorTotal">0.00</span>
    </div>

    <button class="btn-finalizar" onclick="finalizarVenda()">Finalizar Venda (F2)</button>
</div>

<script>
    // O seu link da API do Google Sheets
    const API_URL = "https://script.google.com/macros/s/AKfycbz9zfoUJrNEq3kDqTf4_bksIr_Flme-HoC7ZH3bPNK_IM8Ocwx0cSDywCLsYJFuQ6nycw/exec";
    
    let bancoDeProdutos = [];
    let carrinho = [];
    let total = 0;

    // 1. Carregar os produtos ao abrir a tela
    async function carregarProdutos() {
        try {
            const resposta = await fetch(API_URL);
            bancoDeProdutos = await resposta.json();
            document.getElementById('status').innerText = "Sistema Pronto! Pode bipar os produtos.";
            document.getElementById('codigoInput').disabled = false;
            document.getElementById('codigoInput').focus();
        } catch (erro) {
            document.getElementById('status').innerText = "Erro ao carregar produtos. Verifique sua internet.";
            document.getElementById('status').style.color = "red";
        }
    }

    // 2. Escutar o Leitor de Código de Barras (ou tecla Enter)
    document.getElementById('codigoInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            let codigoDigitado = this.value.trim();
            if(codigoDigitado !== "") {
                adicionarAoCarrinho(codigoDigitado);
                this.value = ""; // Limpa o campo para o próximo bipe
            }
        }
    });

    // 3. Buscar o produto e adicionar à tela
    function adicionarAoCarrinho(codigo) {
        // Procura o produto no banco baixado do Google Sheets
        let produto = bancoDeProdutos.find(p => String(p.ID_Produto) === String(codigo));

        if (produto) {
            let preco = parseFloat(produto.Preco_Venda) || 0;
            
            // Adiciona no array do carrinho
            carrinho.push({
                codigo: produto.ID_Produto,
                nome: produto.Nome_Produto,
                preco: preco
            });

            total += preco;
            atualizarTela();
        } else {
            alert("Produto não encontrado: " + codigo);
        }
    }

    // 4. Atualizar a tabela visual e o total
    function atualizarTela() {
        let tbody = document.getElementById('listaCarrinho');
        tbody.innerHTML = ""; // Limpa a tabela
        
        carrinho.forEach(item => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.codigo}</td>
                <td>${item.nome}</td>
                <td>1</td>
                <td>R$ ${item.preco.toFixed(2)}</td>
                <td>R$ ${item.preco.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('valorTotal').innerText = total.toFixed(2);
    }

    // 5. Botão de Finalizar Venda
    function finalizarVenda() {
        if(carrinho.length === 0) {
            alert("O carrinho está vazio!");
            return;
        }
        alert("Venda de R$ " + total.toFixed(2) + " finalizada com sucesso! (A integração com a planilha de vendas será o próximo passo).");
        carrinho = [];
        total = 0;
        atualizarTela();
        document.getElementById('codigoInput').focus();
    }

    // Atalho de teclado (F2 para finalizar)
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F2') {
            e.preventDefault();
            finalizarVenda();
        }
    });

    // Inicia o sistema
    carregarProdutos();
</script>

</body>
</html>
